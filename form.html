<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z" crossorigin="anonymous" />
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js" integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8shuf57BaghqFfPlYxofvL8/KUEfYiJOMMV+rV" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer"/>
</head>
<body>
     <script src = "javascript.js" defer></script>
    <div class="container text-left p-4">
        <h1 class="heading">
            Add User
        </h1>
        <form id="addUserForm">
            <div class="d-flex flex-column">
                <label for="name" class="label-el">Name</label>
                <input type="text" id="name" class="pl-2 p-1 input-el form-control" />
                <p class="err-msg" id="nameErrMsg"></p>
            </div>
            <div class="d-flex flex-column">
                <label for="email" class="label-el">Email</label>
                <input type="text" id="email" class="pl-2 p-1 input-el form-control" />
                <p class="err-msg" id="emailErrMsg"></p>
            </div>
            <div class="d-flex flex-column">
                <p class="status-title mb-1">Working Status</p>
                <select id="status" class="select-option p-2 form-control">
                    <option value="Active" selected>Active</option>
                    <option value="Inactive">Inactive</option>
                </select>
            </div>
            <div class="mt-3">
                <p class="mb-2 gender">Gender</p>
                <input type="radio" id="genderMale" name="gender" value="male" />
                <label for="genderMale" class="label-el mr-2">Male</label>
                <input type="radio" id="genderFemale" name="gender" value="female" />
                <label for="genderFemale" class="label-el">Female</label>
            </div>
        </form>
        <button type="submit" class="btn btn-primary mt-1 button">Submit</button>
    </div>
</body>
</html>
